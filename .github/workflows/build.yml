name: Cross-Platform Build and Release

on:
  push:
    tags:
      - '*' # Triggers on any tag push

jobs:
  build_mac:
    runs-on: macos-latest # Specifies a macOS runner
    steps:
      - uses: actions/checkout@v4 # Checks out your repository
        with:
          ref: main
          submodules: true # Use this if your project uses git submodules
          fetch-depth: 2

      # Homebrew, dev tools, and CMake already exist
      - name: Configure CMake
        run: mkdir -p build && cd build && cmake ..

      - name: Build Project
        run: cd build && make

      - name: Get Hash
        run: echo "SHORT_SHA=$(git rev-parse --short "$GITHUB_SHA")" >> $GITHUB_ENV

      - name: Check Hash
        run: echo "${{ env.SHORT_SHA }}"

      - name: Archive Project
        run: cd build && tar -czvf fife-${{ env.SHORT_SHA }}-mac.tar.gz fife

      - uses: actions/upload-artifact@v4
        with:
          name: fife-${{ env.SHORT_SHA }}-mac.tar.gz
          path: build/fife-${{ env.SHORT_SHA }}-mac.tar.gz

  build_linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          submodules: true # Use this if your project uses git submodules
          fetch-depth: 2
      - run: git checkout HEAD^

      - name: Install latest CMake
        run: sudo apt-get install -y build-essential cmake

      - name: Configure CMake
        run: mkdir -p build && cd build && cmake ..

      - name: Build Project
        run: cd build && make

      - name: Get Hash
        run: echo "SHORT_SHA=$(git rev-parse --short "$GITHUB_SHA")" >> $GITHUB_ENV

      - name: Check Hash
        run: echo "${{ env.SHORT_SHA }}"

      - name: Archive Project
        run: cd build && tar -czvf fife-${{ env.SHORT_SHA }}-linux-x86.tar.gz fife

      - uses: actions/upload-artifact@v4
        with:
          name: fife-${{ env.SHORT_SHA }}-linux-x86.tar.gz
          path: build/fife-${{ env.SHORT_SHA }}-linux-x86.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: [build_mac, build_linux]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          submodules: true # Use this if your project uses git submodules
          fetch-depth: 2
      - run: git checkout HEAD^

      - name: Get Hash
        run: echo "SHORT_SHA=$(git rev-parse --short "$GITHUB_SHA")" >> $GITHUB_ENV

      - name: Check Hash
        run: echo "${{ env.SHORT_SHA }}"

      - uses: actions/download-artifact@v8
        with:
          name: fife-${{ env.SHORT_SHA }}-mac.tar.gz

      - uses: actions/download-artifact@v8
        with:
          name: fife-${{ env.SHORT_SHA }}-linux-x86.tar.gz

      - name: List files in directory
        run: ls -la

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            fife-${{ env.SHORT_SHA }}-mac.tar.gz
            fife-${{ env.SHORT_SHA }}-linux-x86.tar.gz
