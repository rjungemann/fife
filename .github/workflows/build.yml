name: CMake Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          submodules: true # Use this if your project uses git submodules
          fetch-depth: 2
      - run: git checkout HEAD^

      - name: Install latest CMake
        run: sudo apt-get install -y build-essential cmake

      - name: Configure CMake
        run: mkdir -p build && cd build && cmake ..

      - name: Build Project
        run: cd build && make

      - name: Test Project
        run: cd build && ./fife help

      - name: Archive Project
        run: cd build && tar -czvf fife-linux-x86.tar.gz fife

      - name: Get Hash
        run: echo "SHORT_SHA=$(git rev-parse --short "$GITHUB_SHA")" >> $GITHUB_ENV

      - name: Check Hash
        run: echo "${{ env.SHORT_SHA }}"

      - uses: actions/upload-artifact@v4
        with:
          name: fife-linux-${{ env.SHORT_SHA }}-x86.tar.gz
          path: build/fife-linux-${{ env.SHORT_SHA }}-x86.tar.gz
